server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tradelog_india?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # use 'validate' in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: email, profile
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

# JWT Config
jwt:
  secret: ${JWT_SECRET:tradelog-india-super-secret-key-change-this-in-production-minimum-256-bits}
  access-token-expiry-ms: 900000        # 15 minutes
  refresh-token-expiry-ms: 604800000    # 7 days

# Twilio SMS Config
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:your-twilio-account-sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your-twilio-auth-token}
  from-number: ${TWILIO_FROM_NUMBER:+1234567890}

# App Config
app:
  otp-expiry-minutes: 10
  guest-trial-minutes: 5
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors-allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.tradelog: DEBUG
    org.springframework.security: DEBUG
