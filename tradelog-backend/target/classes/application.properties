# ── SERVER ──────────────────────────────────────────────────
server.port=8080

# ── DATABASE ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/tradelog_india?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=YOUR_SUPER_SECRET_KEY_MIN_256_BITS_CHANGE_THIS_IN_PRODUCTION
app.jwt.access-token-expiry=900000
# 15 minutes in ms
app.jwt.refresh-token-expiry=604800000
# 7 days in ms

# ── EMAIL (Gmail SMTP) ────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@tradelogindia.com
app.mail.from-name=TradeLog India

# ── TWILIO (SMS OTP) ──────────────────────────────────────────
twilio.account-sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth-token=YOUR_TWILIO_AUTH_TOKEN
twilio.phone-number=+1XXXXXXXXXX

# ── GOOGLE OAUTH2 ─────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/oauth2/callback/google

# ── OTP ───────────────────────────────────────────────────────
app.otp.expiry-minutes=10
app.otp.length=6

# ── GUEST TIMER ───────────────────────────────────────────────
app.guest.trial-minutes=5

# ── FILE UPLOAD ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── FRONTEND URL (CORS) ───────────────────────────────────────
app.frontend.url=http://localhost:5173

# ── LOGGING ───────────────────────────────────────────────────
logging.level.com.tradelog=DEBUG
logging.level.org.springframework.security=INFO
